name: Provision AWS Infrastructure

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  TF_STATE_BUCKET_NAME: ${{ secrets.AWS_TF_STATE_BUCKET_NAME }}
  PRIVATE_SSH_KEY: ${{ secrets.AWS_SSH_KEY_PRIVATE }}
  PUBLIC_SSH_KEY: ${{ secrets.AWS_SSH_KEY_PUBLIC }}
  AWS_REGION: us-east-1
  AMI_ID: ami-0f8a61b66d1accaee

jobs:
  deploy-infra:
    name: Provision Infrastructure
    runs-on: ubuntu-latest

    outputs:
      instance_public_ip: ${{ steps.tf-out.outputs.instance_public_ip }}
      ecr_repository_url: ${{ steps.tf-out.outputs.ecr_repository_url }}

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=$TF_STATE_BUCKET_NAME" \
            -backend-config="region=$AWS_REGION"

      - name: Terraform Plan
        run: |
          terraform plan \
            -var="region=$AWS_REGION" \
            -var="ami_id=$AMI_ID" \
            -var="key_name=github-actions" \
            -var="public_key=$PUBLIC_SSH_KEY" \
            -var="private_key=$PRIVATE_SSH_KEY" \
            -out=PLAN

      - name: Terraform Apply
        run: terraform apply -auto-approve PLAN

      - name: Export Terraform outputs
        id: tf-out
        run: |
          echo "instance_public_ip=$(terraform output -raw instance_public_ip)" >> "$GITHUB_OUTPUT"
          echo "ecr_repository_url=$(terraform output -raw ecr_repository_url)" >> "$GITHUB_OUTPUT"
