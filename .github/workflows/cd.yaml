name: Deploys the application to EC2

on:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


jobs:
  deploy-app:
    name: Build and Deploy Application
    runs-on: ubuntu-latest
    needs: deploy-infra

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          ECR_URL: ${{ needs.deploy-infra.outputs.ecr_repository_url }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t "$ECR_URL:$IMAGE_TAG" .
          docker push "$ECR_URL:$IMAGE_TAG"

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ needs.deploy-infra.outputs.instance_public_ip }}
          username: ubuntu
          key: ${{ secrets.AWS_SSH_KEY_PRIVATE }}
          envs: ECR_URL,IMAGE_TAG,AWS_REGION
          script: |
            set -e

            if ! command -v docker >/dev/null; then
              sudo apt-get update -y
              sudo apt-get install -y docker.io
              sudo systemctl enable --now docker
            fi

            if ! command -v aws >/dev/null; then
              sudo apt-get update -y
              sudo apt-get install -y awscli
            fi

            sudo $(aws ecr get-login-password --no-include-email --region "$AWS_REGION")\
              | sudo docker login --username AWS --password-stdin "${ECR_URL%%/*}" 
            sudo docker pull "$ECR_URL:$IMAGE_TAG"
            sudo docker stop goldenowl-app 2>/dev/null || true
            sudo docker rm goldenowl-app 2>/dev/null || true
            sudo docker ps -a || true
            sudo docker run -d \
              --name goldenowl-app \
              --restart unless-stopped \
              -p 80:3000 \
              "$ECR_URL:$IMAGE_TAG"
            sudo docker image prune -f
