name: CD - Provision Infrastructure and Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  TF_STATE_BUCKET_NAME: ${{ secrets.AWS_TF_STATE_BUCKET_NAME }}
  PRIVATE_SSH_KEY: ${{ secrets.AWS_SSH_KEY_PRIVATE }}
  PUBLIC_SSH_KEY: ${{ secrets.AWS_SSH_KEY_PUBLIC }}
  AWS_REGION: us-east-1
  AMI_ID: ami-0f8a61b66d1accaee

jobs:
  deploy-infra:
    name: Provision Infrastructure
    runs-on: ubuntu-latest

    outputs:
      instance_public_ip: ${{ steps.tf-out.outputs.instance_public_ip }}
      ecr_repository_url: ${{ steps.tf-out.outputs.ecr_repository_url }}

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=$TF_STATE_BUCKET_NAME" \
            -backend-config="region=$AWS_REGION"

      - name: Terraform Plan
        run: |
          terraform plan \
            -var="region=$AWS_REGION" \
            -var="ami_id=$AMI_ID" \
            -var="key_name=github-actions" \
            -var="public_key=$PUBLIC_SSH_KEY" \
            -var="private_key=$PRIVATE_SSH_KEY" \
            -out=PLAN

      - name: Terraform Apply
        run: terraform apply -auto-approve PLAN

      - name: Export Terraform outputs
        id: tf-out
        run: |
          echo "instance_public_ip=$(terraform output -raw instance_public_ip)" >> "$GITHUB_OUTPUT"
          echo "ecr_repository_url=$(terraform output -raw ecr_repository_url)" >> "$GITHUB_OUTPUT"
  deploy-app:
    name: Build and Deploy Application
    runs-on: ubuntu-latest
    needs: deploy-infra

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build and push image
      env:
        ECR_URL: ${{ needs.deploy-infra.outputs.ecr_repository_url }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t "$ECR_URL:$IMAGE_TAG" .
        docker push "$ECR_URL:$IMAGE_TAG"

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1
      env:
        ECR_URL: ${{ needs.deploy-infra.outputs.ecr_repository_url }}
        IMAGE_TAG: ${{ github.sha }}
      with:
        host: ${{ needs.deploy-infra.outputs.instance_public_ip }}
        username: ubuntu
        key: ${{ secrets.AWS_SSH_KEY_PRIVATE }}
        envs: ECR_URL,IMAGE_TAG,AWS_REGION
        script: |
          set -e

          if ! command -v docker >/dev/null; then
            sudo apt-get update -y
            sudo apt-get install -y docker.io
            sudo systemctl enable --now docker
          fi

          if ! command -v aws >/dev/null; then
            sudo apt-get update -y
            sudo apt-get install -y awscli
          fi

          aws ecr get-login-password --region "$AWS_REGION" \
            | sudo docker login --username AWS --password-stdin "${ECR_URL%%/*}"
          sudo docker pull "$ECR_URL:$IMAGE_TAG"
          sudo docker stop goldenowl-app 2>/dev/null || true
          sudo docker rm goldenowl-app 2>/dev/null || true
          sudo docker ps -a || true
          sudo docker run -d \
            --name goldenowl-app \
            --restart unless-stopped \
            -p 80:3000 \
            "$ECR_URL:$IMAGE_TAG"
          sudo docker image prune -f
